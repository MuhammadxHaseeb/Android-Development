<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --accent: #FF3008;
    --accent-deep: #C41F00;
    --accent-bright: #FF6A3D;
    --ink: #15171A;
    --muted: #646A73;
    --cream: #FFE9E4;
  }
  html, body { width: 1280px; height: 720px; }
  body {
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Inter, sans-serif;
    width: 1280px; height: 720px; overflow: hidden; position: relative;
    background:
      radial-gradient(1100px 700px at 18% -10%, #FF6A3D 0%, rgba(255,106,61,0) 55%),
      radial-gradient(900px 900px at 115% 120%, #C41F00 0%, rgba(196,31,0,0) 60%),
      linear-gradient(135deg, #FF3008 0%, #E22A06 48%, #C41F00 100%);
  }

  /* floating background food glyphs for texture */
  .bg-food { position: absolute; opacity: 0.10; filter: grayscale(0.1); user-select: none; }
  .bg-food.f1 { font-size: 150px; top: -28px; left: 44%; transform: rotate(-12deg); }
  .bg-food.f2 { font-size: 120px; bottom: 28px; left: 30%; transform: rotate(10deg); }
  .bg-food.f3 { font-size: 110px; top: 40%; left: 2%; transform: rotate(8deg); }
  .bg-food.f4 { font-size: 96px; bottom: 6%; right: 40%; transform: rotate(-8deg); }

  /* ---- LEFT: copy ---- */
  .left {
    position: absolute; left: 64px; top: 0; bottom: 0; width: 720px;
    display: flex; flex-direction: column; justify-content: center; gap: 22px; z-index: 3;
  }
  .kicker {
    display: inline-flex; align-items: center; gap: 12px; align-self: flex-start;
    background: rgba(255,255,255,0.16); border: 1.5px solid rgba(255,255,255,0.35);
    color: #fff; font-weight: 700; font-size: 22px; letter-spacing: 2px;
    padding: 10px 18px; border-radius: 999px; backdrop-filter: blur(2px);
  }
  .kicker .dot { width: 9px; height: 9px; border-radius: 50%; background: #fff; }

  .headline { color: #fff; line-height: 0.94; letter-spacing: -2px; }
  .l1 { font-size: 70px; font-weight: 800; opacity: 0.96; }
  .l2 { font-size: 150px; font-weight: 900; display: flex; align-items: center; gap: 20px; margin: 6px 0; }
  .l2 .box {
    background: #fff; color: var(--accent); padding: 0 22px; border-radius: 22px;
    transform: rotate(-2deg); box-shadow: 0 14px 30px rgba(0,0,0,0.25);
  }
  .l3 { font-size: 96px; font-weight: 900; display: flex; align-items: center; gap: 22px; }
  .l3 .ai {
    -webkit-text-stroke: 3px #fff; color: transparent; font-weight: 900;
  }
  .l3 .spark { font-size: 78px; -webkit-text-stroke: 0; }

  .footline {
    margin-top: 14px; display: flex; align-items: center; gap: 16px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 12px;
    background: #15171A; color: #fff; font-weight: 800; font-size: 26px;
    padding: 14px 22px; border-radius: 16px; box-shadow: 0 12px 26px rgba(0,0,0,0.3);
  }
  .badge .star { color: #FFC53D; font-size: 26px; }
  .stack {
    color: rgba(255,255,255,0.95); font-weight: 700; font-size: 22px; letter-spacing: 0.5px;
  }

  /* ---- RIGHT: phone ---- */
  .phone-wrap {
    position: absolute; right: 70px; top: 50%; transform: translateY(-50%) rotate(4deg);
    z-index: 4;
  }
  .glow {
    position: absolute; inset: -60px; border-radius: 80px;
    background: radial-gradient(closest-side, rgba(255,255,255,0.45), rgba(255,255,255,0) 70%);
    filter: blur(6px);
  }
  .phone {
    position: relative; width: 360px; height: 620px; border-radius: 52px;
    background: #0E0F11; padding: 12px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.45), 0 0 0 2px rgba(255,255,255,0.08) inset;
  }
  .screen {
    width: 100%; height: 100%; border-radius: 42px; overflow: hidden; background: #fff; position: relative;
  }
  .notch {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 116px; height: 26px; background: #0E0F11; border-radius: 999px; z-index: 5;
  }

  /* mini app */
  .app { padding: 18px 16px 0; font-family: -apple-system, "SF Pro Text", sans-serif; }
  .statusbar { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; color: #15171A; padding: 4px 6px 12px; }
  .loc { display: flex; align-items: center; justify-content: space-between; }
  .loc .pin { color: var(--accent); font-weight: 800; font-size: 13px; }
  .loc .addr { font-weight: 800; font-size: 19px; color: var(--ink); }
  .cart { width: 38px; height: 38px; border-radius: 999px; background: #F5F6F8; display: flex; align-items: center; justify-content: center; font-size: 18px; position: relative; }
  .cart .b { position: absolute; top: -3px; right: -3px; background: var(--accent); color: #fff; font-size: 10px; font-weight: 800; width: 18px; height: 18px; border-radius: 999px; display:flex; align-items:center; justify-content:center; }
  .search { margin-top: 12px; background: #F5F6F8; border-radius: 999px; padding: 11px 14px; color: #9AA0A6; font-size: 14px; font-weight: 600; display: flex; gap: 8px; }
  .cats { display: flex; gap: 12px; margin-top: 16px; }
  .cat { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; }
  .cat .tile { width: 50px; height: 50px; border-radius: 999px; background: #F5F6F8; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .cat .tile.on { border: 2px solid var(--accent); }
  .cat .lbl { font-size: 11px; font-weight: 700; color: #15171A; }
  .secttitle { font-size: 19px; font-weight: 800; color: var(--ink); margin: 18px 4px 10px; }
  .card { border-radius: 16px; box-shadow: 0 4px 14px rgba(10,11,13,0.08); overflow: hidden; background: #fff; }
  .hero { height: 118px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 64px;
    background: linear-gradient(135deg, #FFB347 0%, #FF7E5F 55%, #FF3008 100%); }
  .hero .free { position: absolute; top: 10px; left: 10px; background: #1F9D55; color: #fff; font-size: 11px; font-weight: 800; padding: 4px 9px; border-radius: 8px; }
  .hero .heart { position: absolute; top: 8px; right: 8px; width: 30px; height: 30px; border-radius: 999px; background: rgba(10,11,13,0.4); display:flex; align-items:center; justify-content:center; font-size: 15px; }
  .cbody { padding: 10px 12px 12px; }
  .crow { display: flex; justify-content: space-between; align-items: center; }
  .cname { font-size: 16px; font-weight: 800; color: var(--ink); }
  .crate { font-size: 12px; font-weight: 700; color: #15171A; }
  .cmeta { font-size: 12px; font-weight: 600; color: #646A73; margin-top: 3px; }
  .cartbar { position: absolute; left: 14px; right: 14px; bottom: 16px; height: 50px; background: var(--accent);
    border-radius: 16px; display: flex; align-items: center; padding: 0 14px; gap: 10px; box-shadow: 0 10px 22px rgba(255,48,8,0.5); }
  .cartbar .n { background: #fff; color: var(--accent); width: 24px; height: 24px; border-radius: 999px; font-weight: 800; font-size: 13px; display:flex;align-items:center;justify-content:center; }
  .cartbar .t { color: #fff; font-weight: 800; font-size: 15px; flex: 1; }
  .cartbar .p { color: #fff; font-weight: 800; font-size: 15px; }
</style>
</head>
<body>
  <div class="bg-food f1">🍕</div>
  <div class="bg-food f2">🍔</div>
  <div class="bg-food f3">🍣</div>
  <div class="bg-food f4">🌮</div>

  <div class="left">
    <div class="kicker"><span class="dot"></span>EXPO · REACT NATIVE</div>
    <div class="headline">
      <div class="l1">I BUILT A</div>
      <div class="l2"><span class="box">FOOD</span><span>APP</span></div>
      <div class="l3"><span>WITH</span><span class="ai">AI</span><span class="spark">🤖</span></div>
    </div>
    <div class="footline">
      <div class="badge"><span class="star">✦</span>Built with Claude Code</div>
      <div class="stack">no backend · all on-device</div>
    </div>
  </div>

  <div class="phone-wrap">
    <div class="glow"></div>
    <div class="phone">
      <div class="screen">
        <div class="notch"></div>
        <div class="app">
          <div class="statusbar"><span>9:41</span><span>📶 🔋</span></div>
          <div class="loc">
            <div>
              <div class="pin">📍 DELIVER TO</div>
              <div class="addr">Home ▾</div>
            </div>
            <div class="cart">🛍️<span class="b">3</span></div>
          </div>
          <div class="search">🔍 Search Crave</div>
          <div class="cats">
            <div class="cat"><div class="tile on">🍕</div><div class="lbl">Pizza</div></div>
            <div class="cat"><div class="tile">🍣</div><div class="lbl">Sushi</div></div>
            <div class="cat"><div class="tile">🍔</div><div class="lbl">Burgers</div></div>
            <div class="cat"><div class="tile">🥗</div><div class="lbl">Healthy</div></div>
          </div>
          <div class="secttitle">Fastest near you</div>
          <div class="card">
            <div class="hero">🍕<div class="free">Free delivery</div><div class="heart">🤍</div></div>
            <div class="cbody">
              <div class="crow"><div class="cname">Tony’s Wood-Fired</div><div class="crate">★ 4.7</div></div>
              <div class="cmeta">20–30 min · Free delivery · $$</div>
            </div>
          </div>
        </div>
        <div class="cartbar"><span class="n">3</span><span class="t">View cart</span><span class="p">$32.18</span></div>
      </div>
    </div>
  </div>
</body>
</html>
