<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 720px; }
  body {
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Inter, sans-serif;
    width: 1280px; height: 720px; overflow: hidden; position: relative;
    background:
      radial-gradient(1100px 720px at 14% -12%, #FF6A3D 0%, rgba(255,106,61,0) 55%),
      radial-gradient(900px 900px at 118% 125%, #B81C00 0%, rgba(184,28,0,0) 60%),
      linear-gradient(135deg, #FF3008 0%, #E22A06 50%, #B81C00 100%);
  }
  .bg-food { position: absolute; opacity: 0.09; user-select: none; }
  .bg-food.f1 { font-size: 150px; top: -30px; left: 40%; transform: rotate(-12deg); }
  .bg-food.f2 { font-size: 120px; bottom: 24px; left: 24%; transform: rotate(10deg); }
  .bg-food.f3 { font-size: 110px; top: 38%; left: 1%; transform: rotate(8deg); }

  /* LEFT copy */
  .left {
    position: absolute; left: 60px; top: 0; bottom: 0; width: 660px;
    display: flex; flex-direction: column; justify-content: center; gap: 20px; z-index: 5;
  }
  .kicker {
    display: inline-flex; align-items: center; gap: 11px; align-self: flex-start;
    background: rgba(255,255,255,0.16); border: 1.5px solid rgba(255,255,255,0.38);
    color: #fff; font-weight: 800; font-size: 21px; letter-spacing: 2px; padding: 9px 17px; border-radius: 999px;
  }
  .kicker .dot { width: 9px; height: 9px; border-radius: 50%; background: #fff; }
  .headline { color: #fff; line-height: 0.92; letter-spacing: -2px; }
  .l1 { font-size: 66px; font-weight: 800; opacity: 0.97; }
  .l2 { font-size: 132px; font-weight: 900; display: flex; align-items: center; gap: 18px; margin: 8px 0; }
  .l2 .box { background: #fff; color: #FF3008; padding: 0 20px; border-radius: 20px; transform: rotate(-2deg); box-shadow: 0 14px 30px rgba(0,0,0,0.28); }
  .l3 { font-size: 86px; font-weight: 900; display: flex; align-items: center; gap: 20px; }
  .l3 .ai { -webkit-text-stroke: 3px #fff; color: transparent; }
  .l3 .spark { font-size: 70px; -webkit-text-stroke: 0; }
  .footline { margin-top: 16px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .badge { display: inline-flex; align-items: center; gap: 11px; background: #15171A; color: #fff; font-weight: 800; font-size: 25px; padding: 13px 21px; border-radius: 15px; box-shadow: 0 12px 26px rgba(0,0,0,0.32); }
  .badge .star { color: #FFC53D; font-size: 24px; }
  .stack { color: rgba(255,255,255,0.96); font-weight: 700; font-size: 21px; }

  /* RIGHT phones (real screenshots) */
  .phones { position: absolute; right: 24px; top: 0; bottom: 0; width: 600px; z-index: 4; }
  .glow { position: absolute; right: 60px; top: 90px; width: 460px; height: 520px; border-radius: 60px;
    background: radial-gradient(closest-side, rgba(255,255,255,0.5), rgba(255,255,255,0) 70%); filter: blur(8px); }
  .phone { position: absolute; width: 296px; height: 624px; border-radius: 46px; background: #0B0C0E; padding: 9px;
    box-shadow: 0 44px 80px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.08) inset; }
  .phone .screen { width: 100%; height: 100%; border-radius: 38px; background-size: cover; background-position: top center; }
  .phone.back { right: 8px; top: 36px; transform: rotate(8deg); }
  .phone.back .screen { background-image: url("shot-restaurant.png"); }
  .phone.front { right: 268px; top: 86px; transform: rotate(-5deg); z-index: 2; }
  .phone.front .screen { background-image: url("shot-home.png"); }

  .pill-tag {
    position: absolute; z-index: 6; background: #1F9D55; color: #fff; font-weight: 800; font-size: 20px;
    padding: 9px 16px; border-radius: 999px; box-shadow: 0 10px 22px rgba(0,0,0,0.3);
  }
  .pill-tag.t1 { right: 28px; top: 24px; transform: rotate(8deg); }
  .pill-tag.t2 { right: 470px; bottom: 70px; transform: rotate(-5deg); background: #15171A; }
</style>
</head>
<body>
  <div class="bg-food f1">🍔</div>
  <div class="bg-food f2">🍕</div>
  <div class="bg-food f3">🍣</div>

  <div class="left">
    <div class="kicker"><span class="dot"></span>REACT NATIVE · EXPO</div>
    <div class="headline">
      <div class="l1">I BUILT A</div>
      <div class="l2"><span class="box">FOOD</span><span>APP</span></div>
      <div class="l3"><span>WITH</span><span class="ai">AI</span><span class="spark">🤖</span></div>
    </div>
    <div class="footline">
      <div class="badge"><span class="star">✦</span>Built with Claude Code</div>
      <div class="stack">live order tracking</div>
    </div>
  </div>

  <div class="phones">
    <div class="glow"></div>
    <div class="phone back"><div class="screen"></div></div>
    <div class="phone front"><div class="screen"></div></div>
    <div class="pill-tag t1">REAL APP ✦</div>
  </div>
</body>
</html>
